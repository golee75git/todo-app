<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo List--커서수정 커및 후 푸시시</h1>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." />
      <button id="add-btn">추가</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="all">전체보기</button>
      <button class="tab" data-filter="active">진행중</button>
      <button class="tab" data-filter="done">완료</button>
      <button id="close-btn">닫기</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="footer">
      <span id="remaining">남은 항목: 0개</span>
      <button id="clear-btn">완료 항목 삭제</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
